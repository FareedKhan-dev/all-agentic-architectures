name: Re-execute notebooks (manual)

# Manual-only workflow — NO scheduled cron, no automatic LLM spending.
# Run it from the Actions tab when you want to refresh all 35 notebook outputs
# against the live Nebius API and tailor §9 commentary. Opens an auto-PR with
# the diff so you can review before merging.

on:
  workflow_dispatch:
    inputs:
      only_notebook:
        description: "Comma-separated NN ids to re-execute (empty = all 35)"
        required: false
        default: ""
      use_provider:
        description: "LLM provider"
        required: false
        default: "nebius"
      use_model:
        description: "LLM model id"
        required: false
        default: "meta-llama/Llama-3.3-70B-Instruct"

permissions:
  contents: write
  pull-requests: write

jobs:
  re-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + test extras
        run: |
          pip install --upgrade pip
          pip install -e ".[test,nebius,faiss,tavily,networkx]"
          python -m ipykernel install --user --name python3

      - name: Re-build + execute + tailor notebooks
        env:
          PYTHONIOENCODING: utf-8
          LLM_PROVIDER:   ${{ inputs.use_provider }}
          LLM_MODEL:      ${{ inputs.use_model }}
          NEBIUS_API_KEY:    ${{ secrets.NEBIUS_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          python scripts/execute_notebooks.py --only "${{ inputs.only_notebook }}"

      - name: Create pull request with refreshed notebooks
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(notebooks): refresh executed outputs"
          title: "chore(notebooks): refresh executed outputs"
          body: |
            Auto-generated by `notebook-execute.yml` (manual run).

            - Provider: `${{ inputs.use_provider }}`
            - Model: `${{ inputs.use_model }}`
            - Filter: `${{ inputs.only_notebook }}` (empty = all)

            Review the diff to confirm outputs changed as expected, then merge.
          branch: refresh-notebooks-${{ github.run_id }}
          delete-branch: true
